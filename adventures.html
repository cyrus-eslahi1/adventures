<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%231a1a2e'/><rect x='8' y='8' width='8' height='8' fill='%23e94560'/><rect x='16' y='16' width='8' height='8' fill='%23e94560'/></svg>">
    <link rel="stylesheet" href="styles.css">
    <title>Adventure Website — Adventures</title>
</head>
<body class="has-hero-bg">
    <header class="site-header">
        <a href="index.html" class="logo">
            <span class="logo-icon">
                <span class="logo-square"></span>
                <span class="logo-square"></span>
                <span class="logo-square logo-square--accent"></span>
                <span class="logo-square logo-square--accent"></span>
            </span>
            <span class="logo-text">Adventure</span>
        </a>
        <nav class="main-nav">
            <a href="index.html" class="nav-link">Home</a>
            <a href="adventures.html" class="nav-link">Adventures</a>
            <a href="crew.html" class="nav-link">Our Crew</a>
            <a href="donations.html" class="nav-link">Donations</a>
        </nav>
        <a href="adventures.html" class="btn btn--primary">Check it out</a>
    </header>

    <main class="page-content">
        <h1 class="page-title">Adventures</h1>
        <div class="adventures-grid" id="adventures-grid">
            <!-- Cards rendered from js/adventures-data.js -->
        </div>
    </main>

    <script src="js/adventures-data.js?v=3"></script>
    <script>
        function escapeHtml(text) {
            if (text == null) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function createAdventureCard(adventure) {
            const href = 'adventure-detail.html?adventure=' + encodeURIComponent(adventure.slug);
            const card = document.createElement('a');
            card.className = 'adventure-card';
            card.href = href;
            card.innerHTML =
                '<div class="adventure-card__image-wrap">' +
                    '<img class="adventure-card__image" src="' + escapeHtml(adventure.image || '') + '" alt="' + escapeHtml(adventure.name) + '">' +
                '</div>' +
                '<div class="adventure-card__body">' +
                    '<h3 class="adventure-card__name">' + escapeHtml(adventure.name) + '</h3>' +
                    '<p class="adventure-card__description">' + escapeHtml(adventure.description) + '</p>' +
                '</div>';
            return card;
        }

        var adventures = window.ADVENTURES_DATA || [];
        var grid = document.getElementById('adventures-grid');
        adventures.forEach(function (adventure) {
            if (adventure.slug) grid.appendChild(createAdventureCard(adventure));
        });
    </script>
</body>
</html>
